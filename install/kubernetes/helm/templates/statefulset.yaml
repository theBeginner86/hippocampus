{{- if eq .Values.mode "cluster" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hippocampus.fullname" . }}
  labels:
    {{- include "hippocampus.labels" . | nindent 4 }}
    mode: cluster
spec:
  serviceName: {{ .Values.headlessService.name }}
  replicas: {{ .Values.cluster.replicas }}
  selector:
    matchLabels:
      {{- include "hippocampus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "hippocampus.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hippocampus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: raft-rpc
              containerPort: {{ .Values.raft.rpcPort }}
              protocol: TCP
          env:
            - name: HIPPOCAMPUS_MODE
              value: "cluster"
            - name: HIPPOCAMPUS_PORT
              value: "{{ .Values.service.port }}"
            - name: HIPPOCAMPUS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HIPPOCAMPUS_DATA_DIR
              value: "{{ .Values.server.dataDir }}"
            - name: RAFT_ENABLED
              value: "{{ .Values.raft.enabled }}"
            - name: RAFT_RPC_PORT
              value: "{{ .Values.raft.rpcPort }}"
            - name: RAFT_MIN_ELECTION_TIMEOUT
              value: "{{ .Values.raft.minElectionTimeout }}"
            - name: RAFT_MAX_ELECTION_TIMEOUT
              value: "{{ .Values.raft.maxElectionTimeout }}"
            - name: RAFT_HEARTBEAT_INTERVAL
              value: "{{ .Values.raft.heartbeatInterval }}"
            - name: CLUSTER_SERVICE_NAME
              value: "{{ .Values.headlessService.name }}"
            - name: CLUSTER_PEERS
              value: {{ include "hippocampus.clusterPeers" . | quote }}
            - name: STORAGE_AOF_FILE
              value: "{{ .Values.storage.aofFile }}"
            - name: STORAGE_ENABLE_AOF
              value: "{{ .Values.storage.enableAof }}"
          {{- if .Values.probe.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 30
            periodSeconds: 10
          {{- end }}
          {{- if .Values.probe.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.volumes }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
  {{- end }}
{{- end }}
