# Default values for hippocampus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Server mode: single or cluster
mode: single

# Replica count (used for single mode)
replicaCount: 1

image:
  repository: thebeginner86/hippocampus
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: v0.0.1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {} # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  type: LoadBalancer
  port: 6379
  targetPort: 6379
  annotations: {}

# Headless service for StatefulSet (used in cluster mode)
headlessService:
  enabled: false
  name: hippocampus-cluster
  clusterIP: None

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hippocampus.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 50
  targetCPUUtilizationPercentage: 80

# Volume configuration for persistent storage
volumes:
  - name: storage
    emptyDir: {}
    # For production, use persistentVolumeClaim:
    # persistentVolumeClaim:
    #   claimName: hippocampus-pvc

volumeMounts:
  - name: storage
    mountPath: /data
    readOnly: false

# Server configuration
server:
  port: "6379"
  dataDir: "/data"

# RAFT configuration
raft:
  enabled: true
  rpcPort: "7000"
  minElectionTimeout: 150
  maxElectionTimeout: 300
  heartbeatInterval: 50
  snapshotInterval: 100000
  maxLogSize: 1000000

# Cluster configuration (when mode: cluster)
cluster:
  enabled: false
  # Number of replicas in cluster mode
  replicas: 3
  # Peer configuration (auto-generated from replicas)
  # Format: "node-0:hippocampus-cluster-0.hippocampus-cluster:7000:6379,node-1:hippocampus-cluster-1.hippocampus-cluster:7000:6379"

  # Storage configuration
storage:
  aofFile: "/data/database.aof"
  snapshotDir: "/data/snapshots"
  enableAof: true
  aofFsyncPolicy: "everysec" # always, everysec, no

# Health check probes
probe:
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false

nodeSelector: {}

tolerations: []

affinity: {}

# Test connection
testConnection:
  enabled: false
